 name: Build APK from Zip

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Unzip the Project
        run: unzip -o nova-ai.zip -d AndroidProject

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: |
          cd AndroidProject
          gradle wrapper

      - name: Make Gradle Executable
        run: cd AndroidProject && chmod +x ./gradlew

      - name: Build APK without Strict Checks
        run: |
          cd AndroidProject
          ./gradlew assembleDebug -PgoogleServices.missing.passthrough=true --no-daemon
          
          
